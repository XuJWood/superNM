<svg width="1280" height="360" viewBox="0 0 1280 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="superNM — from idea to a shippable project, in one command">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0a0e1f"/>
      <stop offset="0.55" stop-color="#121933"/>
      <stop offset="1" stop-color="#1b0f3a"/>
    </linearGradient>
    <linearGradient id="title" x1="120" y1="120" x2="700" y2="210" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5eead4"/>
      <stop offset="0.5" stop-color="#818cf8"/>
      <stop offset="1" stop-color="#c084fc"/>
    </linearGradient>
    <radialGradient id="glow1" cx="0" cy="0" r="1" gradientTransform="translate(1040 90) scale(320)" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7c3aed" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0" cy="0" r="1" gradientTransform="translate(180 330) scale(300)" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#14b8a6" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#14b8a6" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="34" height="34" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.4" fill="#ffffff" fill-opacity="0.05"/>
    </pattern>
  </defs>

  <rect width="1280" height="360" rx="20" fill="url(#bg)"/>
  <rect width="1280" height="360" rx="20" fill="url(#dots)"/>
  <rect width="1280" height="360" fill="url(#glow1)"/>
  <rect width="1280" height="360" fill="url(#glow2)"/>
  <rect x="1" y="1" width="1278" height="358" rx="19" fill="none" stroke="#ffffff" stroke-opacity="0.08"/>

  <!-- eyebrow -->
  <g font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
    <text x="96" y="96" fill="#7dd3fc" font-size="20" letter-spacing="6" font-weight="600">CLAUDE CODE · PROJECT BOOTSTRAP SKILL</text>

    <!-- title -->
    <text x="92" y="196" fill="url(#title)" font-size="116" font-weight="800" letter-spacing="-2">superNM</text>

    <!-- tagline CN -->
    <text x="98" y="246" fill="#e7e9f3" font-size="30" font-weight="600">从一个想法，到可交付的完整项目工程体系 — 一条命令搞定。</text>
    <!-- tagline EN -->
    <text x="98" y="282" fill="#9aa3b8" font-size="19">Research → architecture → roadmap → code → daily/weekly reports. All scaffolded, all persistent.</text>
  </g>

  <!-- command chip -->
  <g transform="translate(98 308)">
    <rect width="232" height="40" rx="10" fill="#0c1124" stroke="#5eead4" stroke-opacity="0.4"/>
    <circle cx="20" cy="20" r="5" fill="#ff5f56"/>
    <circle cx="38" cy="20" r="5" fill="#ffbd2e"/>
    <circle cx="56" cy="20" r="5" fill="#27c93f"/>
    <text x="78" y="26" font-family="'SFMono-Regular', 'JetBrains Mono', Consolas, monospace" font-size="18" fill="#5eead4" font-weight="600">/superNM</text>
  </g>

  <!-- flow pills -->
  <g font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="600">
    <g transform="translate(360 314)">
      <rect width="104" height="30" rx="15" fill="#ffffff" fill-opacity="0.06" stroke="#818cf8" stroke-opacity="0.35"/>
      <text x="52" y="20" fill="#c7cdfa" text-anchor="middle">产品调研</text>
    </g>
    <g transform="translate(474 314)">
      <rect width="104" height="30" rx="15" fill="#ffffff" fill-opacity="0.06" stroke="#818cf8" stroke-opacity="0.35"/>
      <text x="52" y="20" fill="#c7cdfa" text-anchor="middle">技术架构</text>
    </g>
    <g transform="translate(588 314)">
      <rect width="104" height="30" rx="15" fill="#ffffff" fill-opacity="0.06" stroke="#818cf8" stroke-opacity="0.35"/>
      <text x="52" y="20" fill="#c7cdfa" text-anchor="middle">开发计划</text>
    </g>
    <g transform="translate(702 314)">
      <rect width="104" height="30" rx="15" fill="#ffffff" fill-opacity="0.06" stroke="#818cf8" stroke-opacity="0.35"/>
      <text x="52" y="20" fill="#c7cdfa" text-anchor="middle">前端界面</text>
    </g>
    <g transform="translate(816 314)">
      <rect width="116" height="30" rx="15" fill="#ffffff" fill-opacity="0.06" stroke="#c084fc" stroke-opacity="0.45"/>
      <text x="58" y="20" fill="#e9d5ff" text-anchor="middle">日报 / 周报</text>
    </g>
  </g>
</svg>
